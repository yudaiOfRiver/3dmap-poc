<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D駅マップ - 新宿駅</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="header">新宿駅 3Dマップ</div>

    <!-- 検索 -->
    <div id="search-container">
      <input type="text" id="search-input" placeholder="施設を検索（トイレ, 出口, エレベーター...）" autocomplete="off">
      <button id="search-clear" style="display:none">&times;</button>
      <div id="search-results"></div>
    </div>

    <div id="floor-panel"></div>

    <div id="legend">
      <div class="legend-header">
        <span class="toggle-icon">▼</span>
        <span>凡例</span>
      </div>
      <div class="legend-items">
        <div><span class="legend-color" style="background:#4488ff"></span>通路</div>
        <div><span class="legend-color" style="background:#44cc88"></span>改札内</div>
        <div><span class="legend-color" style="background:#ffaa44"></span>店舗</div>
        <div><span class="legend-color" style="background:#ff6666"></span>階段・EV</div>
        <div><span class="legend-color" style="background:#aa88ff"></span>ホーム</div>
        <div><span class="legend-color" style="background:#888899"></span>フロア基盤</div>
      </div>
    </div>

    <!-- 経路検索 -->
    <div id="route-panel">
      <div class="route-header">経路検索</div>
      <div class="route-inputs">
        <div class="route-field">
          <label>出発</label>
          <input type="text" id="route-start" placeholder="出発地を検索..." autocomplete="off">
          <div id="route-start-results" class="route-ac"></div>
        </div>
        <div class="route-field">
          <label>到着</label>
          <input type="text" id="route-end" placeholder="目的地を検索..." autocomplete="off">
          <div id="route-end-results" class="route-ac"></div>
        </div>
      </div>
      <div class="route-actions">
        <button id="route-go" disabled>検索</button>
        <button id="route-clear">クリア</button>
      </div>
      <div id="route-result"></div>
    </div>

    <!-- 施設詳細パネル -->
    <div id="detail-panel"></div>

    <div id="info-panel"></div>
    <div id="tooltip"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
