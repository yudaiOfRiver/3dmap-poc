<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D駅マップ - 渋谷駅</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="header"><a href="index.html" style="color:var(--text-link);font-size:12px;margin-right:8px;text-decoration:none">←新宿駅</a> 渋谷駅 3Dマップ</div>

    <!-- 検索 -->
    <div id="search-container">
      <input type="text" id="search-input" placeholder="施設を検索（トイレ, 出口, エスカレーター...）" autocomplete="off">
      <button id="search-clear" style="display:none">&times;</button>
      <div id="search-results"></div>
    </div>

    <div id="floor-panel"></div>

    <div id="legend">
      <div class="legend-header">
        <span class="toggle-icon">▼</span>
        <span>凡例</span>
      </div>
      <div class="legend-items">
        <div><span class="legend-color" style="background:#8899aa"></span>壁</div>
        <div><span class="legend-color" style="background:#556677"></span>床</div>
        <div><span class="legend-color" style="background:#667788"></span>天井</div>
        <div><span class="legend-color" style="background:#44aa88"></span>ドア</div>
        <div><span class="legend-color" style="background:#88ccee"></span>窓</div>
        <div><span class="legend-color" style="background:#aa8866"></span>設備</div>
      </div>
    </div>

    <!-- 経路検索 -->
    <div id="route-panel">
      <div class="route-header">経路検索</div>
      <div class="route-inputs">
        <div class="route-field">
          <label>出発</label>
          <input type="text" id="route-start" placeholder="出発地を検索..." autocomplete="off">
          <div id="route-start-results" class="route-ac"></div>
        </div>
        <button id="route-swap" class="route-swap-btn" title="入替">⇅</button>
        <div class="route-field">
          <label>到着</label>
          <input type="text" id="route-end" placeholder="目的地を検索..." autocomplete="off">
          <div id="route-end-results" class="route-ac"></div>
        </div>
      </div>
      <div class="route-options">
        <label class="route-checkbox"><input type="checkbox" id="route-barrier-free"> バリアフリー（階段を避ける）</label>
      </div>
      <div class="route-actions">
        <button id="route-go" disabled>検索</button>
        <button id="route-clear">クリア</button>
      </div>
      <div id="route-result"></div>
    </div>

    <!-- 施設詳細パネル -->
    <div id="detail-panel"></div>

    <div id="info-panel"></div>
    <div id="tooltip"></div>
    <button id="view-mode-btn">👁 目線モード</button>
    <button id="share-btn" title="URLをコピー">&#x1F517;</button>
    <button id="theme-toggle"></button>
  </div>
  <script type="module" src="/src/shibuya-main.ts"></script>
</body>
</html>
